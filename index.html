<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media Maratón Sevilla 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0d0d1a;--surface2:#12122a;--border:#1e1e3a;
  --acc:#e8ff47;--blue:#4da6ff;--green:#39ff87;--red:#ff3a5c;
  --amber:#ffb830;--purple:#a78bfa;--orange:#fb923c;
  --text:#e8e8f0;--muted:#5a5a7a;--muted2:#3a3a5a;
}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;min-height:100vh}

/* SCANLINES overlay */
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}

/* HEADER */
.hdr{padding:1rem 1.5rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:.75rem;position:sticky;top:0;background:rgba(8,8,16,.95);backdrop-filter:blur(10px);z-index:50}
.hdr h1{font-family:"Orbitron",monospace;font-size:clamp(.9rem,2vw,1.3rem);font-weight:700;letter-spacing:.05em;color:var(--text);text-shadow:0 0 20px rgba(232,255,71,.3)}
.hdr h1 em{color:var(--acc);font-style:normal;text-shadow:0 0 30px rgba(232,255,71,.6)}
.hdr-meta{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.12em;font-family:"Orbitron",monospace}

/* GLOBAL PROGRESS */
.global-prog{text-align:right}
.prog-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-family:"Orbitron",monospace;margin-bottom:5px}
.prog-bars{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.prog-bar{height:3px;border-radius:2px;overflow:hidden;flex:1}
.prog-bar-g{background:var(--muted2)}
.prog-bar-r{background:var(--muted2)}
.prog-fill-g{height:100%;background:var(--green);transition:width .4s;box-shadow:0 0 6px var(--green)}
.prog-fill-r{height:100%;background:var(--red);transition:width .4s;box-shadow:0 0 6px var(--red)}
.prog-pcts{display:flex;gap:8px;justify-content:flex-end}
.prog-pct{font-size:11px;font-family:"Orbitron",monospace;font-weight:700}
.prog-pct.g{color:var(--green);text-shadow:0 0 10px var(--green)}
.prog-pct.r{color:var(--red);text-shadow:0 0 10px var(--red)}

/* PHASE NAV */
.phase-nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:rgba(8,8,16,.9);position:sticky;top:67px;z-index:40}
.phase-nav::-webkit-scrollbar{display:none}
.ph-btn{padding:8px 14px;font-family:"Orbitron",monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;margin-bottom:-1px;transition:all .2s}
.ph-btn:hover{color:var(--text)}
.ph-btn.on{color:var(--acc);border-bottom-color:var(--acc);text-shadow:0 0 15px rgba(232,255,71,.5)}

/* WEEK NAV */
.wk-nav{padding:.5rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(8,8,16,.9);position:sticky;top:107px;z-index:30;display:flex;gap:5px;flex-wrap:wrap}
.wk-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:"Orbitron",monospace;font-size:9px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:all .15s}
.wk-btn:hover{border-color:var(--muted2);color:var(--text)}
.wk-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(232,255,71,.05);box-shadow:0 0 10px rgba(232,255,71,.15)}
.wk-btn.current-week{border-color:var(--blue);box-shadow:0 0 8px rgba(77,166,255,.3)}
.wk-btn.current-week.on{border-color:var(--acc)}
.wk-btn::after{content:"";position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;display:none}
.wk-btn.all-done::after{display:block;background:var(--green);box-shadow:0 0 4px var(--green)}
.wk-btn.partial::after{display:block;background:var(--amber);box-shadow:0 0 4px var(--amber)}

/* MAIN */
.main{padding:1.2rem 1.5rem;max-width:880px}

/* WEEK HEADER */
.wk-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.wk-title{font-family:"Orbitron",monospace;font-size:clamp(1.2rem,3vw,2rem);font-weight:900;letter-spacing:-.01em;line-height:1;color:var(--text)}
.wk-title .wn{color:var(--acc);text-shadow:0 0 20px rgba(232,255,71,.5)}
.wk-dates-txt{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:5px;font-family:"Orbitron",monospace}
.wk-desc{font-size:12px;color:var(--muted);margin-top:4px}
.badge{font-family:"Orbitron",monospace;font-size:9px;padding:3px 10px;border-radius:3px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.badge-adapt{background:rgba(57,255,135,.1);color:var(--green);border:1px solid rgba(57,255,135,.3)}
.badge-base{background:rgba(77,166,255,.1);color:var(--blue);border:1px solid rgba(77,166,255,.3)}
.badge-vol{background:rgba(255,184,48,.1);color:var(--amber);border:1px solid rgba(255,184,48,.3)}
.badge-int{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.badge-taper{background:rgba(255,58,92,.1);color:var(--red);border:1px solid rgba(255,58,92,.3)}

/* WEEK STATS */
.wk-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.stat-lbl{font-family:"Orbitron",monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.stat-val{font-family:"Orbitron",monospace;font-size:14px;font-weight:700;color:var(--text)}
.stat-unit{font-size:10px;color:var(--muted)}
.stat.green-stat .stat-val{color:var(--green);text-shadow:0 0 10px rgba(57,255,135,.4)}
.stat.red-stat .stat-val{color:var(--red);text-shadow:0 0 10px rgba(255,58,92,.4)}

/* WEEK PROGRESS BARS */
.wk-prog{display:flex;gap:6px;margin-bottom:1rem;align-items:center}
.wk-prog-bar{flex:1;height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.wk-prog-fill-g{height:100%;background:var(--green);transition:width .4s;box-shadow:0 0 6px var(--green)}
.wk-prog-fill-r{height:100%;background:var(--red);transition:width .4s;box-shadow:0 0 6px var(--red)}
.wk-prog-lbl{font-family:"Orbitron",monospace;font-size:10px;font-weight:700;min-width:36px;text-align:center}
.wk-prog-lbl.g{color:var(--green);text-shadow:0 0 8px var(--green)}
.wk-prog-lbl.r{color:var(--red);text-shadow:0 0 8px var(--red)}

/* DONE BANNER */
.done-banner{display:none;background:rgba(57,255,135,.06);border:1px solid rgba(57,255,135,.3);border-radius:6px;padding:10px 16px;text-align:center;margin-bottom:1rem;font-family:"Orbitron",monospace;font-size:11px;color:var(--green);letter-spacing:.1em;text-shadow:0 0 15px var(--green)}
.done-banner.show{display:block}

/* SESSIONS */
.sessions{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.sess{border:1px solid var(--border);border-radius:8px;background:var(--surface);overflow:hidden;transition:border-color .2s}
.sess.completed{border-color:rgba(57,255,135,.35);background:rgba(57,255,135,.03)}
.sess.skipped{border-color:rgba(255,58,92,.25);background:rgba(255,58,92,.02)}
.sess-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-series{background:var(--blue);box-shadow:0 0 6px var(--blue)}
.d-fartlek{background:var(--green);box-shadow:0 0 6px var(--green)}
.d-rodaje{background:#888}
.d-largo{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.d-rest{background:var(--muted2)}
.d-race{background:var(--red);box-shadow:0 0 8px var(--red)}
.d-fuerza{background:var(--purple);box-shadow:0 0 6px var(--purple)}
.sess-day{font-family:"Orbitron",monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;min-width:64px;flex-shrink:0}
.sess-info{flex:1}
.sess-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.sess.completed .sess-name{color:var(--green)}
.sess.skipped .sess-name{color:var(--red);text-decoration:line-through;opacity:.7}
.sess-pace{font-size:11px;color:var(--muted);margin-top:2px}

/* CHECK BUTTONS */
.chk-wrap{display:flex;gap:6px;flex-shrink:0}
.chk{width:26px;height:26px;border-radius:4px;border:1.5px solid;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s;font-family:"Orbitron",monospace}
.chk-done{border-color:#1a3a1a;color:transparent}
.chk-done:hover{border-color:var(--green);color:var(--green)}
.sess.completed .chk-done{border-color:var(--green);background:rgba(57,255,135,.15);color:var(--green);box-shadow:0 0 8px rgba(57,255,135,.3)}
.chk-skip{border-color:#3a1a1a;color:transparent}
.chk-skip:hover{border-color:var(--red);color:var(--red)}
.sess.skipped .chk-skip{border-color:var(--red);background:rgba(255,58,92,.15);color:var(--red);box-shadow:0 0 8px rgba(255,58,92,.3)}

/* EXPANDABLE BLOCKS */
.expand{padding:0 12px 10px}
.exp-block{border-radius:6px;padding:8px 11px;margin-bottom:5px}
.warm-b{background:rgba(251,146,60,.05);border:1px solid rgba(251,146,60,.2)}
.cool-b{background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.2)}
.bici-b{background:rgba(57,255,135,.04);border:1px solid rgba(57,255,135,.2)}
.exp-hdr{display:flex;align-items:center;gap:6px;font-family:"Orbitron",monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;cursor:pointer;user-select:none}
.warm-c{color:var(--orange)}.cool-c{color:var(--purple)}.bici-c{color:var(--green)}
.exp-arr{transition:transform .2s;display:inline-block;font-size:8px}
.exp-arr.open{transform:rotate(90deg)}
.exp-body{display:none;margin-top:7px;flex-direction:column;gap:4px}
.exp-body.open{display:flex}
.exp-step{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--text);line-height:1.5}
.exp-num{width:15px;height:15px;border-radius:2px;font-family:"Orbitron",monospace;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.warm-n{background:rgba(251,146,60,.15);color:var(--orange)}
.cool-n{background:rgba(167,139,250,.15);color:var(--purple)}

/* FUERZA */
.prog-phase-lbl{font-family:"Orbitron",monospace;font-size:9px;color:var(--purple);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:3px;padding:2px 8px;display:inline-block;margin-bottom:7px;letter-spacing:.08em}
.fgrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.fitem{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);border-radius:6px;padding:7px 8px 6px;text-align:center;width:108px;flex-shrink:0}
.fsvg{width:64px;height:56px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center}
.fname{font-size:10px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:3px}
.freps{font-family:"Orbitron",monospace;font-size:11px;color:var(--acc);font-weight:700;margin-bottom:2px;text-shadow:0 0 8px rgba(232,255,71,.4)}
.fdesc{font-size:10px;color:var(--muted);line-height:1.3}
.fweight{font-size:10px;color:var(--amber);font-family:"Orbitron",monospace;font-weight:600;margin-bottom:2px;letter-spacing:.04em;text-shadow:0 0 6px rgba(255,184,48,.4)}
.frest{font-size:9px;color:var(--blue);font-family:"Orbitron",monospace;margin-top:3px;letter-spacing:.04em;border-top:1px solid rgba(77,166,255,.15);padding-top:3px}

/* RACE BANNER */
.race-banner{background:rgba(255,58,92,.04);border:1px solid rgba(255,58,92,.3);border-radius:8px;padding:1.25rem;text-align:center;margin-bottom:1rem;position:relative;overflow:hidden}
.race-banner::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,58,92,.05),transparent);pointer-events:none}
.race-ttl{font-family:"Orbitron",monospace;font-size:1.4rem;font-weight:900;color:var(--red);letter-spacing:.05em;text-shadow:0 0 30px var(--red)}
.race-goal{font-family:"Orbitron",monospace;font-size:1rem;color:var(--acc);font-weight:700;margin-top:8px;text-shadow:0 0 20px rgba(232,255,71,.5)}
.race-sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.05em}

/* NAV BTNS */
.nav-btns{display:flex;gap:8px;margin-top:.5rem}
.nav-btn{padding:6px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:"Orbitron",monospace;font-size:9px;letter-spacing:.08em;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 8px rgba(232,255,71,.2)}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn:disabled:hover{border-color:var(--border);color:var(--muted);box-shadow:none}

.io-btn{padding:5px 12px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:"Orbitron",monospace;font-size:9px;letter-spacing:.08em;cursor:pointer;transition:all .15s;white-space:nowrap}
.io-btn:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 0 8px rgba(232,255,71,.2)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--acc);border-radius:6px;padding:10px 20px;font-family:"Orbitron",monospace;font-size:11px;color:var(--acc);letter-spacing:.08em;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;text-shadow:0 0 10px rgba(232,255,71,.4)}
.toast.show{opacity:1}
@media(max-width:600px){.hdr,.phase-nav,.wk-nav,.main{padding-left:1rem;padding-right:1rem}.phase-nav{top:64px}.wk-nav{top:103px}}

/* CELEBRATION OVERLAY */
.celebration{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s}
.celebration.show{opacity:1;pointer-events:all}
.celebration-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.celebration-emoji{font-size:clamp(8rem,25vw,14rem);position:relative;z-index:1;animation:emojiPop .4s cubic-bezier(.175,.885,.32,1.275) forwards;filter:drop-shadow(0 0 30px rgba(57,255,135,.6))}
.celebration.fail .celebration-emoji{filter:drop-shadow(0 0 30px rgba(255,58,92,.6))}
@keyframes emojiPop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg)}}
.confetti-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>Media Maratón <em>Sevilla 2026</em></h1>
    <div class="hdr-meta">31 semanas · 27 abr – 29 nov 2026 · objetivo 4:50 /km</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <button onclick="exportProgress()" class="io-btn" title="Descargar progreso como JSON">&#11015; Exportar</button>
    <label class="io-btn" title="Subir JSON de progreso" style="cursor:pointer">&#11014; Importar<input type="file" accept=".json" onchange="importProgress(event)" style="display:none"></label>
  </div>
  <div class="global-prog">
    <div class="prog-lbl">Progreso global</div>
    <div class="prog-bars">
      <div class="prog-bar prog-bar-g"><div class="prog-fill-g" id="gFillG" style="width:0%"></div></div>
      <div class="prog-bar prog-bar-r"><div class="prog-fill-r" id="gFillR" style="width:0%"></div></div>
    </div>
    <div class="prog-pcts">
      <span class="prog-pct g" id="gPctG">0%</span>
      <span class="prog-pct" style="color:var(--muted)">|</span>
      <span class="prog-pct r" id="gPctR">0%</span>
    </div>
  </div>
</div>
<div class="phase-nav" id="phNav"></div>
<div class="wk-nav" id="wkNav"></div>
<div class="main" id="main"></div>

// Calculate current week from today's date
function calcCurrentWeek(){
  var start=new Date(2026,3,27); // April 27 2026
  var today=new Date();
  today.setHours(0,0,0,0);
  var days=Math.floor((today-start)/(1000*60*60*24));
  var wk=Math.floor(days/7)+1;
  return Math.min(Math.max(1,wk),31);
}

var FNAMES={A:["Sentadilla búlgara","Flexiones","Hip thrust en suelo","Remo con mochila","Zancada con giro","Burpee"],B:["Puente glúteo unilateral","Pike push-up","Dead bug","Superman","Plancha lateral","Mountain climber"],C:["Sentadilla sumo","Remo invertido en mesa","Zancada reversa","Dips en silla","Elevación de talones","Saltos al cajón"],D:["Sentadilla con salto","Flexiones con pausa","Step-up a silla","Plancha con toque hombro","Reverse lunge con rodilla arriba","Mountain climber"]};
var FLABELS={A:"Full-body A — Empuje + pierna",B:"Full-body B — Core + estabilidad",C:"Full-body C — Sentadilla + tiron",D:"Full-body D — HIIT funcional"};
var PHASES=[{id:0,name:"F1 Adaptacion",weeks:[1,2,3,4,5,6,7]},{id:1,name:"F2 Base",weeks:[8,9,10,11,12,13,14]},{id:2,name:"F3 Volumen",weeks:[15,16,17,18,19,20,21]},{id:3,name:"F4 Intensidad",weeks:[22,23,24,25,26,27,28]},{id:4,name:"F5 Taper",weeks:[29,30,31]}];
var dotMap={series:"d-series",fartlek:"d-fartlek",rodaje:"d-rodaje",largo:"d-largo",rest:"d-rest",race:"d-race",fuerza:"d-fuerza"};

function phaseOf(n){if(n<=7)return 0;if(n<=14)return 1;if(n<=21)return 2;if(n<=28)return 3;return 4;}
function fBlock(f,wn){var pair=Math.floor((wn-1)/2)%2;return f==="A"?(pair===0?"A":"C"):(pair===0?"B":"D");}
function valid(w){return w.sessions.filter(function(s){return s.type!=="rest";});}
function completedCount(w){return valid(w).filter(function(s){return state[s.id]==="done";}).length;}
function skippedCount(w){return valid(w).filter(function(s){return state[s.id]==="skip";}).length;}
function totalValid(){return WEEKS.reduce(function(a,w){return a+valid(w).length;},0);}
function totalCompleted(){return WEEKS.reduce(function(a,w){return a+completedCount(w);},0);}
function totalSkipped(){return WEEKS.reduce(function(a,w){return a+skippedCount(w);},0);}

function updateGlobalProg(){
  var tot=totalValid(),done=totalCompleted(),skip=totalSkipped();
  var pDone=tot>0?Math.round(done/tot*100):0;
  var pSkip=tot>0?Math.round(skip/tot*100):0;
  document.getElementById("gFillG").style.width=pDone+"%";
  document.getElementById("gFillR").style.width=pSkip+"%";
  document.getElementById("gPctG").textContent=pDone+"% hecho";
  document.getElementById("gPctR").textContent=pSkip+"% perdido";
}

function buildPhNav(){
  var h="";
  PHASES.forEach(function(p){
    h+="<button class=\"ph-btn"+(p.id===curP?" on":"")+"\" onclick=\"selPhase("+p.id+")\">"+p.name+"</button>";
  });
  document.getElementById("phNav").innerHTML=h;
}

function buildWkNav(){
  var wks=PHASES[curP].weeks;var h="";var cw=calcCurrentWeek();
  wks.forEach(function(n){
    var w=WEEKS[n-1],d=completedCount(w),sk=skippedCount(w),v=valid(w).length;
    var dc=(d===v&&v>0)?" all-done":(d>0||sk>0?" partial":"");
    var isCur=(n===cw)?" current-week":"";
    h+="<button class=\"wk-btn"+(n===curW?" on":"")+dc+isCur+"\" onclick=\"selWeek("+n+")\">S"+n+"</button>";
  });
  document.getElementById("wkNav").innerHTML=h;
}

function expandBlock(wu,bici){
  var out="";
  if(bici){out+="<div class=\"exp-block bici-b\"><div class=\"exp-hdr bici-c\" onclick=\"toggleExp(this)\"><span class=\"exp-arr\">&#9658;</span> BICI ALTERNATIVA</div><div class=\"exp-body\"><div style=\"font-size:12px;color:var(--text);line-height:1.6\">"+bici+"</div></div></div>";}
  if(wu&&WU[wu]){
    var w=WU[wu];
    var steps=w.steps.map(function(st,i){return "<div class=\"exp-step\"><div class=\"exp-num warm-n\">"+(i+1)+"</div><div>"+st+"</div></div>";}).join("");
    var cdS=CD.steps.map(function(st,i){return "<div class=\"exp-step\"><div class=\"exp-num cool-n\">"+(i+1)+"</div><div>"+st+"</div></div>";}).join("");
    out+="<div class=\"exp-block warm-b\"><div class=\"exp-hdr warm-c\" onclick=\"toggleExp(this)\"><span class=\"exp-arr\">&#9658;</span> "+w.label.toUpperCase()+"</div><div class=\"exp-body\">"+steps+"</div></div>";
    out+="<div class=\"exp-block cool-b\"><div class=\"exp-hdr cool-c\" onclick=\"toggleExp(this)\"><span class=\"exp-arr\">&#9658;</span> "+CD.label.toUpperCase()+"</div><div class=\"exp-body\">"+cdS+"</div></div>";
  }
  return out?"<div class=\"expand\">"+out+"</div>":"";
}

function fuerzaBlock(f,wn){
  if(!f)return"";
  var key=fBlock(f,wn);
  var ph=phaseOf(wn);
  var progData=PROG[String(ph)]&&PROG[String(ph)][key]?PROG[String(ph)][key]:null;
  var names=FNAMES[key]||[];
  var label=FLABELS[key]||key;
  var phLabel=PHASE_FLABEL[String(ph)]||"";
  var items=names.map(function(nm,i){
    var svg=SVGS[nm]||"<div style=\"width:64px;height:56px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted)\">"+nm.substring(0,4)+"</div>";
    var reps=progData?progData[i][1]:"3x10";
    var desc=progData?progData[i][2]:"";
    var weight=progData&&progData[i][3]?progData[i][3]:null;
    var rest=progData&&progData[i][4]?progData[i][4]:null;
    var weightHtml=weight?"<div class=\"fweight\">&#9646; "+weight+"</div>":"";
    var restHtml=rest?"<div class=\"frest\">&#9203; "+rest+"</div>":"";
    return "<div class=\"fitem\"><div class=\"fsvg\">"+svg+"</div><div class=\"fname\">"+nm+"</div><div class=\"freps\">"+reps+"</div>"+weightHtml+"<div class=\"fdesc\">"+desc+"</div>"+restHtml+"</div>";
  }).join("");
  return "<div class=\"expand\"><div class=\"exp-block cool-b\"><div class=\"exp-hdr cool-c\" onclick=\"toggleExp(this)\"><span class=\"exp-arr\">&#9658;</span> "+label.toUpperCase()+"</div><div class=\"exp-body\" data-row=\"1\"><div class=\"prog-phase-lbl\">"+phLabel+"</div><div class=\"fgrid\">"+items+"</div></div></div></div>";
}

function sessHTML(s,wn){
  var st=state[s.id];
  var isDone=st==="done";var isSkip=st==="skip";
  var isRest=s.type==="rest";var isRace=s.type==="race";
  var cls="sess"+(isDone?" completed":"")+(isSkip?" skipped":"");
  var chks=isRest?"":"<div class=\"chk-wrap\"><button class=\"chk chk-done\" onclick=\"toggleDone(\'"+s.id+"\',\'done\')\" title=\"Completado\">&#10003;</button><button class=\"chk chk-skip\" onclick=\"toggleDone(\'"+s.id+"\',\'skip\')\" title=\"No completado\">&#10005;</button></div>";
  var inner=s.fuerza?fuerzaBlock(s.fuerza,wn):expandBlock(s.warmup,s.bici);
  return "<div class=\""+cls+"\" id=\"card-"+s.id+"\"><div class=\"sess-top\"><div class=\"dot "+(dotMap[s.type]||"d-rest")+"\"></div><div class=\"sess-day\">"+s.day+"</div><div class=\"sess-info\"><div class=\"sess-name\">"+s.name+"</div><div class=\"sess-pace\">"+s.pace+"</div></div>"+chks+"</div>"+inner+"</div>";
}

function renderWeek(){
  var w=WEEKS[curW-1];
  var v=valid(w),d=completedCount(w),sk=skippedCount(w);
  var tot=v.length;
  var pDone=tot>0?Math.round(d/tot*100):0;
  var pSkip=tot>0?Math.round(sk/tot*100):0;
  var allDone=d===tot&&tot>0;
  var km=w.sessions.reduce(function(a,s){if(s.type==="series"||s.type==="fartlek")return a+9;if(s.type==="rodaje")return a+7;if(s.type==="largo")return a+13;if(s.type==="race")return a+21;return a;},0);
  var prev=curW>1?curW-1:null;var next=curW<31?curW+1:null;
  var h="";
  if(w.isRaceWeek)h+="<div class=\"race-banner\"><div class=\"race-ttl\">MEDIA MARATÓN SEVILLA</div><div class=\"race-sub\">Domingo 29 de noviembre 2026</div><div class=\"race-goal\">4:50 /KM &nbsp;·&nbsp; ~1H 42'</div></div>";
  h+="<div class=\"wk-hdr\"><div><div class=\"wk-title\"><span class=\"wn\">S"+w.n+"</span> "+w.dates+"</div><div class=\"wk-dates-txt\">"+w.dates+" 2026</div><div class=\"wk-desc\">"+w.desc+"</div></div><span class=\"badge "+w.badge+"\">"+w.phaseLabel+"</span></div>";
  h+="<div class=\"wk-stats\"><div class=\"stat\"><div class=\"stat-lbl\">Sesiones</div><div class=\"stat-val\">"+tot+"<span class=\"stat-unit\"> activas</span></div></div><div class=\"stat green-stat\"><div class=\"stat-lbl\">Completadas</div><div class=\"stat-val\">"+pDone+"%</div></div><div class=\"stat red-stat\"><div class=\"stat-lbl\">No completadas</div><div class=\"stat-val\">"+pSkip+"%</div></div><div class=\"stat\"><div class=\"stat-lbl\">Km aprox.</div><div class=\"stat-val\">"+km+"<span class=\"stat-unit\"> km</span></div></div></div>";
  h+="<div class=\"wk-prog\"><span class=\"wk-prog-lbl g\">"+pDone+"%</span><div class=\"wk-prog-bar\"><div class=\"wk-prog-fill-g\" style=\"width:"+pDone+"%\"></div></div><div class=\"wk-prog-bar\"><div class=\"wk-prog-fill-r\" style=\"width:"+pSkip+"%\"></div></div><span class=\"wk-prog-lbl r\">"+pSkip+"%</span></div>";
  h+="<div class=\"done-banner"+(allDone?" show":"")+"\">&#9654; SEMANA COMPLETADA — EXCELENTE TRABAJO</div>";
  h+="<div class=\"sessions\">"+w.sessions.map(function(s){return sessHTML(s,w.n);}).join("")+"</div>";
  h+="<div class=\"nav-btns\"><button class=\"nav-btn\" onclick=\"adjWeek(-1)\""+(!prev?" disabled":"")+">"+(prev?"&#9664; S"+prev:"&#9664;")+"</button><button class=\"nav-btn\" onclick=\"adjWeek(1)\""+(!next?" disabled":"")+">"+(next?"S"+next+" &#9654;":"&#9654;")+"</button></div>";
  document.getElementById("main").innerHTML=h;
  updateGlobalProg();buildWkNav();
}

function selPhase(id){curP=id;curW=PHASES[id].weeks[0];buildPhNav();buildWkNav();renderWeek();}
function selWeek(n){curW=n;buildWkNav();renderWeek();}
function adjWeek(dir){
  var nw=curW+dir;if(nw<1||nw>31)return;
  var np=phaseOf(nw);
  if(np!==curP){curP=np;buildPhNav();}
  curW=nw;buildWkNav();renderWeek();
  window.scrollTo({top:0,behavior:"smooth"});
}
function toggleDone(id,action){
  var prev=state[id];
  if(prev===action){state[id]=null;}else{state[id]=action;}
  save();renderWeek();updateGlobalProg();
  if(state[id]===action&&action==="done"){showCelebration("done");}
  if(state[id]===action&&action==="skip"){showCelebration("skip");}
}
function toggleExp(hdr){
  var body=hdr.nextElementSibling;
  var arr=hdr.querySelector(".exp-arr");
  var open=body.classList.contains("open");
  body.classList.toggle("open",!open);
  if(!open&&body.getAttribute("data-row")==="1"){body.style.flexDirection="column";body.style.flexWrap="nowrap";}
  arr.classList.toggle("open",!open);
}

function exportProgress(){
  var data={
    version:1,
    exportDate:new Date().toISOString(),
    planStart:"2026-04-27",
    raceDate:"2026-11-29",
    state:state
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  var d=new Date();
  var ds=d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,"0")+"-"+d.getDate().toString().padStart(2,"0");
  a.download="sevilla2026_progreso_"+ds+".json";
  a.click();
  showToast("Progreso exportado correctamente");
}

function importProgress(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.state){throw new Error("Formato incorrecto");}
      state=data.state;
      save();
      renderWeek();
      updateGlobalProg();
      showToast("Progreso importado: "+Object.keys(state).filter(function(k){return state[k];}).length+" sesiones restauradas");
    }catch(err){
      showToast("Error al importar: "+err.message);
    }
  };
  reader.readAsText(file);
  event.target.value="";
}

function showToast(msg){
  var t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}

function showCelebration(type){
  var el=document.getElementById("celebration");
  var emoji=document.getElementById("celebEmoji");
  var wrap=document.getElementById("confettiWrap");
  if(type==="done"){
    emoji.textContent="\uD83D\uDC4D";
    el.classList.remove("fail");
    spawnConfetti(wrap);
  } else {
    emoji.textContent="\u274C";
    el.classList.add("fail");
    wrap.innerHTML="";
  }
  el.classList.add("show");
  setTimeout(function(){closeCelebration();},2800);
}

function closeCelebration(){
  document.getElementById("celebration").classList.remove("show");
}

function spawnConfetti(wrap){
  wrap.innerHTML="";
  var colors=["#e8ff47","#39ff87","#ff3a5c","#4da6ff","#ffb830","#a78bfa","#fb923c","#ffffff"];
  var shapes=["square","circle","rect"];
  for(var i=0;i<80;i++){
    var p=document.createElement("div");
    p.className="confetti-piece";
    var color=colors[Math.floor(Math.random()*colors.length)];
    var size=(Math.random()*8+5)+"px";
    var isCircle=Math.random()>.5;
    p.style.cssText="left:"+Math.random()*100+"%;width:"+size+";height:"+(isCircle?size:(Math.random()*4+3)+"px")+";background:"+color+";border-radius:"+(isCircle?"50%":"2px")+";animation-duration:"+(Math.random()*2+1.5)+"s;animation-delay:"+(Math.random()*.6)+"s;opacity:1";
    wrap.appendChild(p);
  }
}

load();
// Open on current week automatically
var cw=calcCurrentWeek();
curP=phaseOf(cw);
curW=cw;
buildPhNav();buildWkNav();renderWeek();
</script>

<div class="celebration" id="celebration" onclick="closeCelebration()">
  <div class="celebration-bg"></div>
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="celebration-emoji" id="celebEmoji"></div>
</div>
</body>
</html>
